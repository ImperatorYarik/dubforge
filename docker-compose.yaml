services:
  api: 
    build: ./api
    container_name: video-trans-api
    ports:
      - "8000:8000"
    environment:
     - MONGO_URI=${MONGO_URI}
     - S3_ENDPOINT=${S3_ENDPOINT}
     - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
     - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
     - JWT_SECRET_KEY=${JWT_SECRET_KEY}
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - project_network

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - project_network

volumes:
  minio_data:
  mongo_data:

networks:
  project_network: