services:
  frontend:
    build: ./frontend
    container_name: video-trans-frontend
    ports:
      - "5173:80"
    depends_on:
      - api
    networks:
      - project_network

  api: 
    build: ./api
    container_name: video-trans-api
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    volumes:
      - ./api:/app
    ports:
      - "8000:8000"
    environment:
     - MONGO_URI=${MONGO_URI}
     - S3_ENDPOINT=${S3_ENDPOINT}
     - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
     - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
     - JWT_SECRET_KEY=${JWT_SECRET_KEY}
     - REDIS_URL=${REDIS_URL}

    networks:
      - project_network


  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - project_network

  worker:
    build: ./worker
    container_name: video-trans-worker
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
     - HF_TOKEN=${HF_TOKEN} # Hugging Face token to download models faster
     - MONGO_URI=${MONGO_URI}
     - S3_ENDPOINT=${S3_ENDPOINT}
     - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
     - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
     - JWT_SECRET_KEY=${JWT_SECRET_KEY}
     - REDIS_URL=${REDIS_URL}
    volumes:
      - ./worker:/app
    depends_on:
      - redis
    networks:
      - project_network

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - project_network

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - project_network

volumes:
  minio_data:
  mongo_data:

networks:
  project_network: