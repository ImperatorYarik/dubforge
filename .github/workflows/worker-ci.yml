name: Worker CI

on:
  pull_request:
    paths:
      - "worker/**"
      - ".github/workflows/worker-ci.yml"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            worker/requirements.txt
            worker/requirements-dev.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Install non-GPU runtime dependencies
        # Install packages that are resolvable without CUDA so pylint can
        # analyse imports. GPU/ML packages (faster-whisper, TTS, demucs) are
        # excluded — their modules are listed under ignored-modules in .pylintrc.
        run: |
          pip install \
            celery redis pydantic-settings pydantic \
            boto3 pymongo soundfile watchdog

      - name: pylint
        run: pylint app --rcfile=.pylintrc --fail-under=7.0

      - name: bandit (security scan)
        run: bandit -r app -ll

      - name: radon (cyclomatic complexity)
        run: radon cc app -a -nb

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: worker/requirements-dev.txt

      - name: Install dependencies
        # GPU/ML packages (faster-whisper, TTS, demucs, torch) require CUDA and
        # cannot be installed in CI. All subprocess and GPU calls are mocked in
        # the test suite, so only the non-GPU runtime packages are needed.
        run: |
          pip install -r requirements-dev.txt
          pip install \
            celery redis pydantic-settings pydantic \
            boto3 pymongo soundfile watchdog ffmpeg-python

      - name: pytest
        run: pytest --tb=short -q
