events {
  worker_connections 1024;
}

http {
  # dubforge.local → frontend
  server {
    listen 80;
    server_name dubforge.local;

    location / {
      proxy_pass http://frontend:80;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }

  # api.dubforge.local → FastAPI (REST + WebSocket)
  server {
    listen 80;
    server_name api.dubforge.local;

    location / {
      proxy_pass http://api:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

      # WebSocket support (for /jobs/{id}/progress)
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 3600s;
    }
  }

  # grafana.dubforge.local → Grafana
  server {
    listen 80;
    server_name grafana.dubforge.local;

    location / {
      proxy_pass http://grafana:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }

  # prometheus.dubforge.local → Prometheus
  server {
    listen 80;
    server_name prometheus.dubforge.local;

    location / {
      proxy_pass http://prometheus:9090;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }

  # minio.dubforge.local → MinIO S3 API
  server {
    listen 80;
    server_name minio.dubforge.local;

    # Required for large file uploads
    client_max_body_size 0;

    location / {
      proxy_pass http://minio:9000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_connect_timeout 300;
      proxy_request_buffering off;
    }
  }

  # minio-console.dubforge.local → MinIO Web Console
  server {
    listen 80;
    server_name minio-console.dubforge.local;

    location / {
      proxy_pass http://minio:9001;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

      # MinIO console uses WebSocket
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }

  # loki.dubforge.local → Loki
  server {
    listen 80;
    server_name loki.dubforge.local;

    location / {
      proxy_pass http://loki:3100;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
