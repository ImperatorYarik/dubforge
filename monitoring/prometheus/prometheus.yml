global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api
    static_configs:
      - targets: ['api:8000']

  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: mongodb
    static_configs:
      - targets: ['mongodb-exporter:9216']

  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ['minio:9000']

  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: nvidia-gpu
    static_configs:
      - targets: ['nvidia-gpu-exporter:9835']
